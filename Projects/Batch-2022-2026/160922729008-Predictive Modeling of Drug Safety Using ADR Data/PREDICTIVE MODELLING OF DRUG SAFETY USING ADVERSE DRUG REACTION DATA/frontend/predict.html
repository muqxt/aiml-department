<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulsefy — Drug Safety Prediction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-up {
      animation: slide-up 0.5s ease-out both;
    }
    .slide-up-delay-1 { animation-delay: 0.1s; }
    .slide-up-delay-2 { animation-delay: 0.2s; }
    .slide-up-delay-3 { animation-delay: 0.3s; }
    
    /* Drug badge hover effect */
    #drugs-list span button:hover svg {
      transform: scale(1.1);
    }
  </style>
</head>
<body class="bg-[#F4F4F4] text-gray-800 flex flex-col min-h-screen">

  <!-- Navbar -->
  <nav class="bg-[#005461] text-[#F4F4F4] shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-3">
      <a href="index.html" class="text-2xl font-bold tracking-wide hover:opacity-80 transition-opacity">
        Pulsefy
      </a>
      <ul class="flex flex-wrap gap-4 text-sm font-medium">
        <li><a href="index.html"   class="hover:text-[#00B7B5] transition-colors">Home</a></li>
        <li><a href="predict.html" class="text-[#00B7B5] font-semibold transition-colors">Predict</a></li>
        <li><a href="ddi.html"     class="hover:text-[#00B7B5] transition-colors">DDI Check</a></li>
        <li><a href="report.html"  class="hover:text-[#00B7B5] transition-colors">Report</a></li>
        <li><a href="alerts.html"  class="hover:text-[#00B7B5] transition-colors">Alerts</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="bg-[#018790] text-[#F4F4F4] py-10 px-4">
    <div class="max-w-3xl mx-auto text-center">
      <h1 class="text-3xl sm:text-4xl font-extrabold mb-2">Drug Safety Prediction</h1>
      <p class="text-base sm:text-lg opacity-90">
        Enter patient details and drug names to receive an AI-powered risk assessment.
      </p>
    </div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-10 flex flex-col gap-8">

    <!-- Prediction Form Card -->
    <div class="bg-white rounded-xl shadow-md p-6">
      <h2 class="text-xl font-bold text-[#005461] mb-5">Patient &amp; Drug Information</h2>
      <form id="predict-form" class="flex flex-col gap-5" novalidate>

        <!-- Drugs -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-gray-700">
            Drug Names <span class="text-gray-400 font-normal">(at least one required)</span>
          </label>
          
          <!-- Drug input with Add button -->
          <div class="flex gap-2">
            <input
              id="drug-input"
              type="text"
              placeholder="e.g. aspirin"
              class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#018790] focus:border-transparent"
            />
            <button
              type="button"
              id="add-drug-btn"
              class="bg-[#00B7B5] text-white font-semibold px-4 py-2 rounded-lg hover:bg-[#018790] transition-colors whitespace-nowrap"
            >
              + Add Drug
            </button>
          </div>
          
          <!-- List of added drugs -->
          <div id="drugs-list" class="flex flex-wrap gap-2 min-h-[2rem]"></div>
          
          <!-- Hidden input to store drugs array -->
          <input type="hidden" id="drugs-hidden" />
        </div>

        <!-- Age -->
        <div class="flex flex-col gap-1">
          <label for="age" class="text-sm font-semibold text-gray-700">Age</label>
          <input
            id="age"
            type="number"
            min="0"
            max="120"
            placeholder="e.g. 65"
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#018790] focus:border-transparent"
            required
          />
        </div>

        <!-- Gender -->
        <div class="flex flex-col gap-1">
          <label for="gender" class="text-sm font-semibold text-gray-700">Gender</label>
          <select
            id="gender"
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#018790] focus:border-transparent bg-white"
            required
          >
            <option value="" disabled selected>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Disease -->
        <div class="flex flex-col gap-1">
          <label for="disease" class="text-sm font-semibold text-gray-700">Disease / Condition</label>
          <input
            id="disease"
            type="text"
            placeholder="e.g. atrial fibrillation"
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#018790] focus:border-transparent"
            required
          />
        </div>

        <!-- Error message -->
        <p id="form-error" class="text-red-600 text-sm hidden"></p>

        <!-- Submit -->
        <button
          type="submit"
          id="submit-btn"
          class="bg-[#018790] text-white font-semibold px-6 py-3 rounded-lg hover:bg-[#005461] transition-colors flex items-center justify-center gap-2"
        >
          <span id="btn-text">Run Safety Prediction</span>
          <svg id="btn-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
          </svg>
        </button>
      </form>
    </div>

    <!-- Results Section (hidden until API responds) -->
    <section id="results-section" class="hidden flex flex-col gap-6">

      <!-- Drug Predictions (one card per drug) -->
      <div id="drug-predictions-container" class="flex flex-col gap-4"></div>

      <!-- Interactions Sub-card -->
      <div id="result-interactions" class="bg-white rounded-xl shadow-md p-6 slide-up slide-up-delay-1">
        <h3 class="text-lg font-bold text-[#005461] mb-4">Drug–Drug Interactions</h3>
        <div id="interactions-content"></div>
      </div>

      <!-- Alerts Sub-card -->
      <div id="result-alerts" class="bg-white rounded-xl shadow-md p-6 slide-up slide-up-delay-2">
        <h3 class="text-lg font-bold text-[#005461] mb-4">Community Alerts</h3>
        <div id="alerts-content"></div>
      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="bg-[#005461] text-[#F4F4F4] text-center py-5 text-sm opacity-90">
    <p>&copy; 2025 Pulsefy — Drug Safety Intelligence Platform</p>
  </footer>

  <script src="js/predict.js"></script>
</body>
</html>
